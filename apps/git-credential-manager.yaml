name: git-credential-manager

# cf. https://github.com/git-ecosystem/git-credential-manager/blob/release/docs/install.md
install:
  - type: brew
    cask: git-credential-manager
    os: macos

  - type: custom
    os: linux
    check: command -v git-credential-manager
    version_cmd: git-credential-manager --version 2>/dev/null | awk '{print $1}' | sed 's/+.*//'
    latest_cmd: curl -sS --max-time 10 "https://api.github.com/repos/git-ecosystem/git-credential-manager/releases/latest" | jq -r '.tag_name | ltrimstr("v")'
    script: |
      GCM_VERSION=$(curl -sS --max-time 10 "https://api.github.com/repos/git-ecosystem/git-credential-manager/releases/latest" | jq -r '.tag_name | ltrimstr("v")')
      curl -Lo /tmp/gcm.deb "https://github.com/git-ecosystem/git-credential-manager/releases/download/v${GCM_VERSION}/gcm-linux-x64-${GCM_VERSION}.deb"
      sudo dpkg -i /tmp/gcm.deb
      rm /tmp/gcm.deb
      git-credential-manager configure
    uninstall: |
      git-credential-manager unconfigure
      sudo dpkg -r gcm
