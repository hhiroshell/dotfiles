name: virtctl

# cf. https://kubevirt.io/user-guide/user_workloads/virtctl_client_tool/
install:
  - type: custom
    os: macos
    check: command -v virtctl
    version_cmd: virtctl version --client 2>/dev/null | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1
    latest_cmd: curl -sS --max-time 10 "https://storage.googleapis.com/kubevirt-prow/release/kubevirt/kubevirt/stable.txt"
    script: |
      VERSION="${PKGMUX_PINNED_VERSION:-$(curl -sS --max-time 10 "https://storage.googleapis.com/kubevirt-prow/release/kubevirt/kubevirt/stable.txt")}"
      ARCH=$(uname -m)
      [[ "$ARCH" == "arm64" ]] && ARCH="arm64" || ARCH="amd64"
      curl -L -o /tmp/virtctl "https://github.com/kubevirt/kubevirt/releases/download/${VERSION}/virtctl-${VERSION}-darwin-${ARCH}"
      chmod +x /tmp/virtctl
      sudo mv /tmp/virtctl /usr/local/bin/virtctl
    uninstall: |
      sudo rm -f /usr/local/bin/virtctl
